<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trump News Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#f0efe8; --muted:#7a7a8c; --accent:#e8c97a;
    --pol:#7b8cde; --eco:#5ec98e; --dip:#e87a6a;
    --pol-bg:rgba(123,140,222,0.1); --eco-bg:rgba(94,201,142,0.1); --dip-bg:rgba(232,122,106,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;}
  .topbar{border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);z-index:100;}
  .logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);}
  .logo span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .timestamp{font-size:12px;color:var(--muted);}
  .refresh-btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 14px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .refresh-btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
  .refresh-btn.loading svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .main{max-width:860px;margin:0 auto;padding:2.5rem 2rem;}
  .hero{margin-bottom:2.5rem;}
  .hero-title{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,48px);line-height:1.1;letter-spacing:-1px;margin-bottom:0.5rem;}
  .hero-title em{color:var(--accent);font-style:italic;}
  .hero-sub{font-size:14px;color:var(--muted);}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem;}
  .stat{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .stat-value{font-size:28px;font-weight:500;line-height:1;}
  .stat.pol .stat-value{color:var(--pol);}
  .stat.eco .stat-value{color:var(--eco);}
  .stat.dip .stat-value{color:var(--dip);}
  .filters{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .filter-btn{font-size:13px;padding:7px 18px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .filter-btn:hover{color:var(--text);}
  .filter-btn.active{background:var(--surface2);color:var(--text);}
  .filter-btn.active.pol{color:var(--pol);border-color:var(--pol);background:var(--pol-bg);}
  .filter-btn.active.eco{color:var(--eco);border-color:var(--eco);background:var(--eco-bg);}
  .filter-btn.active.dip{color:var(--dip);border-color:var(--dip);background:var(--dip-bg);}
  .news-list{display:flex;flex-direction:column;gap:1px;}
  .news-card{background:var(--surface);padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:14px;transition:background 0.15s;border-left:2px solid transparent;animation:fadeIn 0.3s ease;}
  .news-list .news-card:first-child{border-radius:12px 12px 0 0;}
  .news-list .news-card:last-child{border-radius:0 0 12px 12px;}
  .news-list .news-card:only-child{border-radius:12px;}
  .news-card:hover{background:var(--surface2);}
  .news-card.pol:hover{border-left-color:var(--pol);}
  .news-card.eco:hover{border-left-color:var(--eco);}
  .news-card.dip:hover{border-left-color:var(--dip);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .card-num{font-size:11px;color:var(--muted);min-width:22px;padding-top:3px;font-weight:500;}
  .card-body{flex:1;min-width:0;}
  .card-title{font-size:14px;font-weight:400;line-height:1.55;color:var(--text);margin-bottom:8px;text-decoration:none;display:block;}
  .card-title:hover{color:var(--accent);}
  .card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;letter-spacing:0.4px;text-transform:uppercase;}
  .badge.pol{background:var(--pol-bg);color:var(--pol);}
  .badge.eco{background:var(--eco-bg);color:var(--eco);}
  .badge.dip{background:var(--dip-bg);color:var(--dip);}
  .source{font-size:12px;color:var(--muted);}
  .pubdate{font-size:12px;color:var(--muted);}
  .error-msg{background:rgba(232,122,106,0.08);border:0.5px solid rgba(232,122,106,0.3);border-radius:10px;padding:1rem 1.25rem;font-size:13px;color:var(--dip);margin-bottom:1.5rem;}
  .loading-state{text-align:center;padding:4rem 1rem;color:var(--muted);font-size:14px;}
  .dot-anim::after{content:'...';animation:dots 1.2s infinite;}
  @keyframes dots{0%,20%{content:'.';}40%{content:'..';}60%,100%{content:'...';}}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
  @media(max-width:600px){.main{padding:1.5rem 1rem;}.stats{grid-template-columns:repeat(2,1fr);}.topbar{padding:0 1rem;}}
  .translate-btn{font-size:11px;padding:2px 8px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
  .translate-btn:hover{color:var(--text);border-color:var(--text);}
  .translate-btn.loading{opacity:0.5;pointer-events:none;}
  .translated-title{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5;display:none;}
</style>
</head>
<body>
<nav class="topbar">
  <div class="logo">Trump<span>.</span>Brief</div>
  <div class="topbar-right">
    <span class="timestamp" id="timestamp"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadNews()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      새로고침
    </button>
  </div>
</nav>
<main class="main">
  <div class="hero">
    <h1 class="hero-title">Trump News<br><em>Briefing</em></h1>
    <p class="hero-sub">Google News 기반 · 최신 Top 30 · 정치 / 경제 / 외교 분류</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">전체</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat pol"><div class="stat-label">정치</div><div class="stat-value" id="s-pol">—</div></div>
    <div class="stat eco"><div class="stat-label">경제</div><div class="stat-value" id="s-eco">—</div></div>
    <div class="stat dip"><div class="stat-label">외교</div><div class="stat-value" id="s-dip">—</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-cat="all" onclick="filterCat('all')">전체</button>
    <button class="filter-btn pol" data-cat="pol" onclick="filterCat('pol')">정치</button>
    <button class="filter-btn eco" data-cat="eco" onclick="filterCat('eco')">경제</button>
    <button class="filter-btn dip" data-cat="dip" onclick="filterCat('dip')">외교</button>
  </div>
  <div id="error-area"></div>
  <div id="news-list" class="news-list"></div>
</main>
<script>
const POL_KW=['congress','senate','republican','democrat','election','vote','impeach','white house','administration','supreme court','legislation','bill','law','president','gop','party','campaign','rally','executive order','house','cabinet'];
const ECO_KW=['economy','trade','tariff','market','stock','gdp','inflation','tax','budget','deficit','dollar','fed','interest rate','export','import','business','jobs','unemployment','wall street','oil','energy','crypto','bank','treasury','recession','growth'];
const DIP_KW=['china','russia','europe','nato','ukraine','iran','north korea','mexico','canada','summit','diplomat','foreign','military','war','deal','treaty','ally','middle east','israel','saudi','japan','korea','taiwan','india','united nations','minister','meeting','talks'];
let allArticles=[],currentCat='all';
function categorize(t){
  const s={pol:0,eco:0,dip:0},l=t.toLowerCase();
  POL_KW.forEach(k=>{if(l.includes(k))s.pol++;});
  ECO_KW.forEach(k=>{if(l.includes(k))s.eco++;});
  DIP_KW.forEach(k=>{if(l.includes(k))s.dip++;});
  const max=Math.max(s.pol,s.eco,s.dip);
  return max===0?'pol':Object.keys(s).find(k=>s[k]===max);
}
function cleanTitle(t){return t.replace(/ - [^-]+$/,'').trim();}
function extractSource(t){const m=t.match(/ - ([^-]+)$/);return m?m[1].trim():'';}
function parseRSS(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  return [...doc.querySelectorAll('item')].slice(0,30).map(item=>{
    const raw=item.querySelector('title')?.textContent||'';
    return{title:cleanTitle(raw),source:extractSource(raw),link:item.querySelector('link')?.textContent||'',pubDate:item.querySelector('pubDate')?.textContent||'',cat:categorize(raw)};
  });
}
function timeAgo(d){
  if(!d)return'';
  const m=(Date.now()-new Date(d))/60000;
  if(m<60)return`${Math.round(m)}분 전`;
  if(m<1440)return`${Math.round(m/60)}시간 전`;
  return`${Math.round(m/1440)}일 전`;
}
function renderCards(articles){
  const list=document.getElementById('news-list');
  if(!articles.length){list.innerHTML='<div class="empty">해당 카테고리 뉴스가 없습니다.</div>';return;}
  const label={pol:'정치',eco:'경제',dip:'외교'};
  list.innerHTML=articles.map((a,i)=>`<div class="news-card ${a.cat}">
    <span class="card-num">${String(i+1).padStart(2,'0')}</span>
    <div class="card-body">
      <a class="card-title" href="${a.link}" target="_blank">${a.title}</a>
      <div class="translated-title" id="translated-${i}"></div>
      <div class="card-meta">
        <span class="badge ${a.cat}">${label[a.cat]}</span>
        ${a.source?`<span class="source">${a.source}</span>`:''}
        ${timeAgo(a.pubDate)?`<span style="color:var(--border2)">·</span><span class="pubdate">${timeAgo(a.pubDate)}</span>`:''}
        <button class="translate-btn" id="btn-${i}" onclick="translate(${i}, \`${a.title.replace(/`/g,"'")}\`)">번역</button>
      </div>
    </div>
  </div>`).join('');
}
function filterCat(cat){
  currentCat=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  renderCards(cat==='all'?allArticles:allArticles.filter(a=>a.cat===cat));
}
function updateStats(a){
  document.getElementById('s-total').textContent=a.length;
  document.getElementById('s-pol').textContent=a.filter(x=>x.cat==='pol').length;
  document.getElementById('s-eco').textContent=a.filter(x=>x.cat==='eco').length;
  document.getElementById('s-dip').textContent=a.filter(x=>x.cat==='dip').length;
}
async function loadNews(){
  const btn=document.getElementById('refresh-btn');
  const err=document.getElementById('error-area');
  const list=document.getElementById('news-list');
  btn.classList.add('loading');err.innerHTML='';
  list.innerHTML='<div class="loading-state"><span class="dot-anim">뉴스 불러오는 중</span></div>';
  try{
    const res=await fetch('/.netlify/functions/news');
    if(!res.ok)throw new Error(`서버 오류 ${res.status}`);
    const xml=await res.text();
    allArticles=parseRSS(xml);
    if(!allArticles.length)throw new Error('기사를 찾을 수 없습니다');
    updateStats(allArticles);
    const now=new Date().toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('timestamp').textContent=now+' 업데이트';
    filterCat(currentCat);
  }catch(e){
    err.innerHTML=`<div class="error-msg">⚠ ${e.message}</div>`;
    list.innerHTML='';
  }finally{btn.classList.remove('loading');}
}
async function translate(idx, title){
  const btn=document.getElementById(`btn-${idx}`);
  const box=document.getElementById(`translated-${idx}`);
  btn.classList.add('loading');btn.textContent='번역 중...';
  try{
    const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(title)}&langpair=en|ko`);
    const data=await res.json();
    const translated=data.responseData?.translatedText;
    if(translated){
      box.textContent='🇰🇷 '+translated;
      box.style.display='block';
      btn.textContent='번역됨';
      btn.style.color='var(--accent)';
    }
  }catch(e){
    btn.textContent='실패';
  }finally{
    btn.classList.remove('loading');
  }
}  
loadNews();
</script>
</body>
</html>
